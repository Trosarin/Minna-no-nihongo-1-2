<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>日本語 — Grammatik Hub</title>
<meta name="description" content="Japanisch Grammatik — Minna no Nihongo + Chuukyuu e Ikou">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="日本語">
<meta name="theme-color" content="#7a1a14">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&display=swap" rel="stylesheet">

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    background:#f4ede0;
    color:#1a1612;
    font-family:"Shippori Mincho",serif;
    min-height:100vh;
  }
  body{
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background-image:
      radial-gradient(circle at 10% 20%, rgba(192,54,44,.04) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(184,137,58,.05) 0%, transparent 40%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:2rem 1rem;
  }
  .hub{
    max-width:480px;
    width:100%;
    text-align:center;
  }
  h1{
    font-size:1.4rem;
    color:#7a1a14;
    margin-bottom:.4rem;
    letter-spacing:.05em;
  }
  .subtitle{
    color:#6b5e4a;
    font-size:.9rem;
    margin-bottom:2rem;
  }
  .book-section{
    background:white;
    border-radius:12px;
    padding:1.4rem 1rem;
    margin-bottom:1.2rem;
    box-shadow:0 2px 8px rgba(26,22,18,.08);
    border:1px solid rgba(122,26,20,.1);
  }
  .book-icon{
    font-size:2rem;
    margin-bottom:.4rem;
  }
  .book-title{
    font-size:1.1rem;
    color:#1a1612;
    margin-bottom:.2rem;
    font-weight:600;
  }
  .book-subtitle{
    font-size:.75rem;
    color:#888;
    margin-bottom:1rem;
  }
  .lang-buttons{
    display:flex;
    gap:.5rem;
    justify-content:center;
  }
  .lang-btn{
    flex:1;
    padding:.7rem .5rem;
    text-decoration:none;
    background:#7a1a14;
    color:white;
    border-radius:8px;
    font-size:.95rem;
    font-weight:600;
    letter-spacing:.05em;
    transition:all .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .lang-btn:hover, .lang-btn:active{
    background:#a02620;
    transform:translateY(-1px);
  }
  .lang-btn .flag{
    display:block;
    font-size:.7rem;
    opacity:.8;
    margin-top:.15rem;
  }
  .footer{
    margin-top:1rem;
    color:#999;
    font-size:.7rem;
  }
</style>

</head>
<body>

<div class="hub">
  <h1>日本語の文法</h1>
  <p class="subtitle">Japanese Grammar Explanation</p>

  <div class="book-section">
    <div class="book-icon">📕</div>
    <div class="book-title">みんなの日本語</div>
    <div class="book-subtitle">Minna no Nihongo · L1 – L50</div>
    <div class="lang-buttons">
      <a class="lang-btn" href="./minna/">Deutsch<span class="flag">🇩🇪 DE</span></a>
      <a class="lang-btn" href="./minna-en/">English<span class="flag">🇬🇧 EN</span></a>
    </div>
  </div>

  <div class="book-section">
    <div class="book-icon">📘</div>
    <div class="book-title">中級へ行こう</div>
    <div class="book-subtitle">Chuukyuu e Ikou · L1 – L10</div>
    <div class="lang-buttons">
      <a class="lang-btn" href="./chuukyuu/">Deutsch<span class="flag">🇩🇪 DE</span></a>
      <a class="lang-btn" href="./chuukyuu-en/">English<span class="flag">🇬🇧 EN</span></a>
    </div>
  </div>

  <p class="footer">Matze is awesome GmbH · do not send further · Offline-fähig</p>
</div>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then(reg => console.log('SW registered'))
        .catch(err => console.log('SW failed:', err));
    });
  }
</script>

</body>
</html>
